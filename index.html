<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astir, Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <script src="sphere.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app">
    <aside class="rail" aria-label="Primary">
      <div class="brand">
        <span class="mini" id="mini" aria-hidden="true"><span class="halo"></span><span class="core"></span></span>
        <span class="name">Astir</span>
      </div>
      <nav class="nav">
        <a class="active" href="index.html">Today</a>
        <a href="#" aria-disabled="true">Watchlist</a>
        <a href="#" aria-disabled="true">Pipeline</a>
      </nav>
      <div class="user"><span class="av" aria-hidden="true"></span>Kate</div>
    </aside>

    <main class="main">
      <div class="date" id="todayDate"></div>
      <h1 id="greeting">Good morning, Kate</h1>

      <section class="hero">
        <canvas id="sphere" width="220" height="220" aria-label="Living sphere"></canvas>
        <div class="whisper" id="whisper">Warm and steady. Today is still unwritten.</div>
        <div class="act-row">
          <button class="btn solid" id="addJob" type="button">Add a job</button>
          <span class="sep-dot" aria-hidden="true">·</span>
          <button class="chip prep" data-day-kind="prep" type="button">Prep day</button>
          <button class="chip rest" data-day-kind="rest" type="button">Rest day</button>
        </div>
      </section>

      <section class="week" aria-labelledby="weekLabel">
        <div class="label" id="weekLabel">This week</div>
        <div class="days" id="weekDays"></div>
      </section>

      <section class="glance" aria-labelledby="motionLabel">
        <div class="label" id="motionLabel">In motion</div>
        <div class="row-lite">
          <div><div class="co">Enpal</div><div class="role">Senior Product Manager, Energy Platform</div></div>
          <span class="pill">2nd interview, Thu</span>
        </div>
        <div class="row-lite">
          <div><div class="co">Aiven</div><div class="role">Senior PM, Data Governance</div></div>
          <span class="pill sage">Take-home in review</span>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="jobBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="jobTitle">
      <div class="modal-head">
        <h2 id="jobTitle">Add application</h2>
        <button class="icon-btn" id="closeJob" type="button" aria-label="Close">×</button>
      </div>
      <form id="jobForm">
        <label>
          <span>Link (optional)</span>
          <input name="link" type="url" autocomplete="url" placeholder="https://">
        </label>
        <label>
          <span>Company</span>
          <input name="company" type="text" autocomplete="organization" required>
        </label>
        <label>
          <span>Role</span>
          <input name="role" type="text" autocomplete="off" required>
        </label>
        <div class="field-row">
          <label>
            <span>Applied date</span>
            <input name="appliedDate" type="date" required>
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option>Applied</option>
              <option>Interview</option>
              <option>Offer</option>
              <option>Closed</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="cancelJob" type="button">Cancel</button>
          <button class="btn solid" type="submit">Save application</button>
        </div>
      </form>
    </section>
  </div>

  <div class="snackbar" id="snackbar" role="status" aria-live="polite" hidden></div>
</body>
</html>
